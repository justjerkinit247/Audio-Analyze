name: Gemma Live Payload Validation

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate-gemma-live-contract:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      PYTHONPATH: src
      OLLAMA_FINAL_PROMPT_SYNTHESIS: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install -q --upgrade pip
          python -m pip install -q -r requirements.txt

      - name: Compile Gemma live path and tests
        run: |
          python -m compileall -q \
            src/audio_analyze/ltx_seed_image_analyzer.py \
            src/audio_analyze/ltx_gemma_prompt_synthesizer.py \
            src/audio_analyze/ltx_prompt_budget.py \
            src/audio_analyze/ltx_live_run.py \
            tests/test_local_ai_vision.py \
            tests/test_gemma_bounded_visual_contract.py \
            tests/test_gemma_prompt_retention.py \
            tests/test_ltx_live_run.py

      - name: Run authoritative Gemma payload tests
        shell: bash
        run: |
          set +e
          python -m pytest -q \
            tests/test_local_ai_vision.py \
            tests/test_gemma_bounded_visual_contract.py \
            tests/test_gemma_prompt_retention.py \
            tests/test_ltx_live_run.py \
            > pytest-gemma.log 2>&1
          status=$?
          cat pytest-gemma.log
          exit $status

      - name: Run full pytest suite
        shell: bash
        run: |
          set +e
          python -m pytest -q > pytest-full.log 2>&1
          status=$?
          cat pytest-full.log
          exit $status

      - name: Upload pytest reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gemma-pytest-reports
          path: |
            pytest-gemma.log
            pytest-full.log
          if-no-files-found: error
