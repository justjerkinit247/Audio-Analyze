name: Motion Freedom Profile Smoke Test

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Compile motion-freedom path
        env:
          PYTHONPATH: src
        run: |
          python -m compileall -q \
            src/audio_analyze/ltx_motion_freedom.py \
            src/audio_analyze/ltx_live_cli.py \
            tests/test_ltx_motion_freedom.py \
            tests/test_ltx_live_cli.py

      - name: Run motion-freedom tests
        env:
          PYTHONPATH: src
        run: |
          python -m pytest -q \
            tests/test_ltx_motion_freedom.py \
            tests/test_ltx_live_cli.py
