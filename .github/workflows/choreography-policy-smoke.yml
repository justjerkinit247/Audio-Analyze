name: Structured Choreography Policy Smoke Test

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Compile policy path
        env:
          PYTHONPATH: src
        run: |
          python -m compileall -q \
            src/audio_analyze/ltx_choreography_profiles.py \
            src/audio_analyze/tap_accent_sync.py \
            src/audio_analyze/ltx_plan_prompt_expander.py \
            src/audio_analyze/ltx_live_run.py \
            tests/test_ltx_choreography_profiles.py \
            tests/test_ltx_tap_accent_sync.py \
            tests/test_ltx_plan_prompt_expander.py \
            tests/test_ltx_live_run.py

      - name: Run policy tests
        env:
          PYTHONPATH: src
        run: |
          python -m pytest -q \
            tests/test_ltx_choreography_profiles.py \
            tests/test_ltx_tap_accent_sync.py \
            tests/test_ltx_plan_prompt_expander.py \
            tests/test_ltx_live_run.py
