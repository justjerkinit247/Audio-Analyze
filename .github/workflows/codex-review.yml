name: Codex Pull Request Review

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

concurrency:
  group: codex-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  codex-review:
    name: Review PR with Codex
    if: >-
      github.event.pull_request.draft == false &&
      vars.CODEX_REVIEW_ENABLED == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    outputs:
      final_message: ${{ steps.run_codex.outputs.final-message }}

    steps:
      - name: Checkout pull request merge commit
        uses: actions/checkout@v5
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/merge
          fetch-depth: 1
          persist-credentials: false

      - name: Fetch pull request base and head
        env:
          PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          git fetch --no-tags origin \
            "$PR_BASE_REF" \
            "+refs/pull/$PR_NUMBER/head"

      - name: Run Codex review
        id: run_codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          permission-profile: ":read-only"
          effort: high
          prompt: |
            Review pull request #${{ github.event.pull_request.number }} in ${{ github.repository }}.

            Follow the repository instructions in AGENTS.md. Review only changes introduced between:

              base: ${{ github.event.pull_request.base.sha }}
              head: ${{ github.event.pull_request.head.sha }}

            Inspect the diff and any directly affected code. Do not modify files. Do not make network calls or attempt live LTX, OpenAI, Runway, Ollama, or other paid/external generation requests.

            Prioritize:
            - accidental paid/live execution or weakened preflight safeguards;
            - secret exposure or excessive workflow permissions;
            - false-success states involving empty plans, failed scenes, stale clips, partial renders, or missing seed mappings;
            - Windows/Linux path portability regressions;
            - loss or corruption of AUDIO_TIMING, MOTION_PROMPT, NEGATIVE_PROMPT, beat alignment, filename-hint expansion, or ASMO negative memory;
            - committed local cache, media, generated output, editor/NLE metadata, or machine-specific paths;
            - tests that appear to pass without exercising the claimed behavior.

            Return a concise review. For every finding, identify the file and line or changed behavior, explain the concrete failure mode, and suggest the smallest safe fix. Do not invent findings. If there are no actionable defects, say so and list the validation you inspected.

            Pull request title and body:
            ----
            ${{ github.event.pull_request.title }}
            ${{ github.event.pull_request.body }}

  publish-review:
    name: Publish Codex review
    needs: codex-review
    if: needs.codex-review.outputs.final_message != ''
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write

    steps:
      - name: Post Codex review comment
        uses: actions/github-script@v7
        env:
          CODEX_FINAL_MESSAGE: ${{ needs.codex-review.outputs.final_message }}
        with:
          github-token: ${{ github.token }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: `## Codex review\n\n${process.env.CODEX_FINAL_MESSAGE}`,
            });